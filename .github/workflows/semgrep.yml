name: Central Security Scan

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep@sha256:2b33f46ba66cf8cc2ad59ccfa7d22951fd00c632c38f1339e84ec8e6e641a942
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Check out central security rules
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: kkz6/security-workflows
          path: .security-workflows

      - name: Run Semgrep
        run: >-
          semgrep scan
          --error
          --metrics=off
          --config .security-workflows/semgrep.yml
          --config p/security-audit
          --config p/secrets
          .
